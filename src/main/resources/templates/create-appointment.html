<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Create Appointment Slot</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .form-container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .btn-save {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px;
            cursor: pointer;
            width: 100%;
            border-radius: 4px;
            font-size: 16px;
        }

        .btn-cancel {
            display: block;
            text-align: center;
            margin-top: 10px;
            color: #666;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="form-container">
        <h2>New Appointment Slot</h2>
        <div th:if="${error}"
            style="color: white; background-color: #d9534f; padding: 15px; border-radius: 4px; margin-bottom: 20px;">
            <p th:text="${error}" style="margin: 0;"></p>
        </div>
        <form th:action="@{/instructor/create-appointment}" th:object="${appointment}" method="post">

            <div class="form-group">
                <label>Title</label>
                <input type="text" th:field="*{title}" placeholder="e.g., Office Hours" required>
            </div>

            <div class="form-group">
                <label>Start Date & Time</label>
                <input type="datetime-local" th:field="*{startTime}" required>
            </div>

            <div class="form-group">
                <label>End Date & Time</label>
                <input type="datetime-local" th:field="*{endTime}" required>
            </div>

            <div class="form-group">
                <label>Type</label>
                <select th:field="*{type}">
                    <option th:value="'INDIVIDUAL'">Individual</option>
                    <option th:value="'GROUP'">Group</option>
                </select>
            </div>

            <div class="form-group">
                <label>Location</label>
                <input type="text" th:field="*{location}" placeholder="e.g., Room 44 or Online" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea th:field="*{description}" rows="3"></textarea>
            </div>

            <button type="submit" class="btn-save">Create Slot</button>
            <a th:href="@{/instructor/dashboard}" class="btn-cancel">Cancel</a>
        </form>
    </div>
</body>

</html>
