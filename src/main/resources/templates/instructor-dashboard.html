<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Instructor Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .container {
            padding: 2rem;
            max-width: 1000px;
            margin: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .btn-create {
            background-color: #28a745;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #f8f9fa;
        }

        .status-booked {
            color: #d9534f;
            font-weight: bold;
        }

        .status-available {
            color: #28a745;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1 th:text="'Welcome, ' + ${instructorName}">Instructor Dashboard</h1>
            <div>
                <a th:href="@{/instructor/create-appointment}" class="btn-create">+ Create New Slot</a>
                <a th:href="@{/logout}" style="margin-left: 15px; color: #666;">Logout</a>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Date/Time</th>
                    <th>Type</th>
                    <th>Location</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="appt : ${appointments}">
                    <td th:text="${appt.title}">Title</td>
                    <td th:text="${#temporals.format(appt.startTime, 'MMM dd, h:mm a')}">Date</td>
                    <td th:text="${appt.type}">Type</td>
                    <td th:text="${appt.location}">Location</td>
                    <td>
                        <span th:if="${appt.isBooked}">
                            <strong class="status-booked">Booked by:</strong>
                            <span th:text="${appt.bookedBy.name}">Student Name</span>
                        </span>
                        <span th:unless="${appt.isBooked}" class="status-available">Available</span>
                    </td>
                    <td>
                        <form th:action="@{/instructor/delete-appointment/{id}(id=${appt.id})}" method="post"
                            onsubmit="return confirm('Are you sure you want to cancel this appointment?');">
                            <button type="submit"
                                style="background-color: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">
                                Cancel
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(appointments)}">
                    <td colspan="5" style="text-align: center; color: #888;">No appointments created yet.</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>

</html>
